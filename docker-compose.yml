services:
  db-mysql:
    image: mysql:8.0
    container_name: juno-db
    restart: always
    environment:
      MYSQL_DATABASE: inventoryDB
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app-juno:
    build: .
    container_name: juno-app
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - db-mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/inventoryDB?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

volumes:
  mysql_data: